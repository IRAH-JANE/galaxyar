<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>GalaxyAR Cinematic Scanner</title>

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        font-family: "Segoe UI", system-ui, sans-serif;
      }

      :root {
        --target-color: #4f9fff;
      }

      a-scene {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
      }

      .scanner-ui {
        position: fixed;
        inset: 0;
        z-index: 10;
        color: #fff;
        pointer-events: none;
        overflow: hidden;
      }

      .scanner-ui::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          radial-gradient(
            circle at 50% 44%,
            color-mix(in srgb, var(--target-color) 22%, transparent),
            transparent 30%
          ),
          radial-gradient(
            circle at 18% 20%,
            rgba(130, 170, 255, 0.13),
            transparent 26%
          ),
          radial-gradient(
            circle at 80% 72%,
            rgba(180, 120, 255, 0.12),
            transparent 28%
          );
        opacity: 0.28;
        transition: opacity 0.45s ease;
      }

      .scanner-ui.detected::before {
        opacity: 0.6;
      }

      .scanner-top {
        position: absolute;
        top: 14px;
        left: 14px;
        right: 14px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        z-index: 30;
      }

      .scanner-back,
      .cinema-btn {
        pointer-events: auto;
        appearance: none;
        border: 1px solid
          color-mix(in srgb, var(--target-color) 28%, rgba(255, 255, 255, 0.14));
        border-radius: 999px;
        background:
          radial-gradient(
            circle at 20% 10%,
            color-mix(in srgb, var(--target-color) 22%, transparent),
            transparent 55%
          ),
          rgba(6, 10, 25, 0.88);
        color: #fff;
        font: inherit;
        font-size: 13px;
        font-weight: 850;
        padding: 9px 14px;
        cursor: pointer;
        text-decoration: none;
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        box-shadow: 0 12px 35px rgba(0, 0, 0, 0.35);
      }

      .scanner-back:hover,
      .cinema-btn:hover {
        background:
          radial-gradient(
            circle at 20% 10%,
            color-mix(in srgb, var(--target-color) 34%, transparent),
            transparent 55%
          ),
          rgba(18, 30, 62, 0.95);
      }

      .scanner-status {
        pointer-events: none;
        border: 1px solid
          color-mix(in srgb, var(--target-color) 30%, rgba(255, 255, 255, 0.1));
        border-radius: 999px;
        background:
          radial-gradient(
            circle at 18% 20%,
            color-mix(in srgb, var(--target-color) 18%, transparent),
            transparent 58%
          ),
          rgba(6, 10, 25, 0.84);
        color: rgba(255, 255, 255, 0.86);
        font-size: 12px;
        font-weight: 850;
        padding: 9px 14px;
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        box-shadow:
          0 0 28px color-mix(in srgb, var(--target-color) 18%, transparent),
          0 12px 35px rgba(0, 0, 0, 0.35);
      }

      .scan-frame {
        position: absolute;
        inset: 17% 22%;
        border-radius: 34px;
        border: 2px solid
          color-mix(in srgb, var(--target-color) 28%, transparent);
        box-shadow:
          0 0 44px color-mix(in srgb, var(--target-color) 22%, transparent),
          inset 0 0 42px
            color-mix(in srgb, var(--target-color) 10%, transparent);
        opacity: 0.72;
        pointer-events: none;
        transition:
          opacity 0.4s ease,
          transform 0.4s ease;
      }

      .scan-frame::before {
        content: "";
        position: absolute;
        left: 10%;
        right: 10%;
        top: 12%;
        height: 2px;
        background: linear-gradient(
          90deg,
          transparent,
          color-mix(in srgb, var(--target-color) 85%, white),
          transparent
        );
        animation: scanLine 2.2s ease-in-out infinite;
      }

      .scan-frame::after {
        content: "";
        position: absolute;
        inset: -2px;
        border-radius: 34px;
        background:
          linear-gradient(var(--target-color), var(--target-color)) top left /
            62px 3px no-repeat,
          linear-gradient(var(--target-color), var(--target-color)) top left /
            3px 62px no-repeat,
          linear-gradient(var(--target-color), var(--target-color)) top right /
            62px 3px no-repeat,
          linear-gradient(var(--target-color), var(--target-color)) top right /
            3px 62px no-repeat,
          linear-gradient(var(--target-color), var(--target-color)) bottom
            left / 62px 3px no-repeat,
          linear-gradient(var(--target-color), var(--target-color)) bottom
            left / 3px 62px no-repeat,
          linear-gradient(var(--target-color), var(--target-color)) bottom
            right / 62px 3px no-repeat,
          linear-gradient(var(--target-color), var(--target-color)) bottom
            right / 3px 62px no-repeat;
        opacity: 0.72;
      }

      @keyframes scanLine {
        0% {
          top: 12%;
          opacity: 0;
        }

        20% {
          opacity: 1;
        }

        80% {
          opacity: 1;
        }

        100% {
          top: 86%;
          opacity: 0;
        }
      }

      .detected .scan-frame {
        opacity: 0;
        transform: scale(1.08);
      }

      .scanner-guide {
        position: absolute;
        left: 50%;
        bottom: 30px;
        width: min(720px, calc(100vw - 28px));
        transform: translateX(-50%);
        text-align: center;
        padding: 13px 18px;
        border-radius: 999px;
        background:
          radial-gradient(
            circle at 20% 20%,
            rgba(79, 159, 255, 0.16),
            transparent 55%
          ),
          rgba(6, 10, 25, 0.86);
        border: 1px solid rgba(145, 180, 255, 0.14);
        color: rgba(255, 255, 255, 0.78);
        font-size: 13px;
        font-weight: 750;
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        transition:
          opacity 0.25s ease,
          transform 0.25s ease;
        z-index: 20;
      }

      .scanner-guide.hidden {
        opacity: 0;
        transform: translateX(-50%) translateY(14px);
      }

      .cinema-title {
        position: absolute;
        left: 50%;
        top: 48%;
        width: 100%;
        transform: translate(-50%, -50%) scale(0.9);
        text-align: center;
        font-size: clamp(52px, 12vw, 210px);
        line-height: 0.84;
        font-weight: 950;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: transparent;
        -webkit-text-stroke: 1px
          color-mix(in srgb, var(--target-color) 45%, rgba(255, 255, 255, 0.23));
        opacity: 0;
        filter: blur(12px);
        pointer-events: none;
        z-index: 2;
        text-shadow:
          0 0 28px color-mix(in srgb, var(--target-color) 32%, transparent),
          0 0 90px color-mix(in srgb, var(--target-color) 20%, transparent);
      }

      .detected .cinema-title {
        animation: titleReveal 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      @keyframes titleReveal {
        0% {
          opacity: 0;
          transform: translate(-50%, -50%) scale(0.82);
          filter: blur(20px);
        }

        42% {
          opacity: 0.78;
          transform: translate(-50%, -50%) scale(1.04);
          filter: blur(0);
        }

        100% {
          opacity: 0.34;
          transform: translate(-50%, -50%) scale(1);
          filter: blur(0);
        }
      }

      .cinema-subtitle {
        position: absolute;
        left: 50%;
        top: calc(50% + min(16vw, 165px));
        width: min(720px, calc(100vw - 40px));
        transform: translateX(-50%) translateY(18px);
        text-align: center;
        opacity: 0;
        pointer-events: none;
        z-index: 12;
      }

      .detected .cinema-subtitle {
        animation: subtitleReveal 0.8s ease forwards;
        animation-delay: 0.45s;
      }

      .cinema-subtitle .kicker {
        color: color-mix(in srgb, var(--target-color) 78%, white);
        font-size: 11px;
        font-weight: 900;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        margin-bottom: 6px;
      }

      .cinema-subtitle h1 {
        font-size: clamp(28px, 5vw, 58px);
        line-height: 0.95;
        font-weight: 950;
        margin-bottom: 8px;
      }

      .cinema-subtitle p {
        font-size: clamp(13px, 1.4vw, 18px);
        line-height: 1.45;
        color: rgba(255, 255, 255, 0.72);
      }

      @keyframes subtitleReveal {
        to {
          opacity: 1;
          transform: translateX(-50%) translateY(0);
        }
      }

      .cinema-hud {
        position: absolute;
        left: 50%;
        bottom: 24px;
        width: min(610px, calc(100vw - 28px));
        transform: translateX(-50%) translateY(22px);
        opacity: 0;
        padding: 14px;
        border-radius: 24px;
        background: linear-gradient(
          135deg,
          color-mix(in srgb, var(--target-color) 18%, rgba(8, 14, 32, 0.92)),
          rgba(4, 7, 18, 0.94)
        );
        border: 1px solid
          color-mix(in srgb, var(--target-color) 30%, rgba(255, 255, 255, 0.1));
        box-shadow:
          0 0 34px color-mix(in srgb, var(--target-color) 16%, transparent),
          0 22px 70px rgba(0, 0, 0, 0.55),
          inset 0 1px 0 rgba(255, 255, 255, 0.06);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        pointer-events: auto;
        transition:
          opacity 0.45s ease,
          transform 0.45s ease;
        z-index: 22;
      }

      .cinema-hud.visible {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }

      .cinema-hud-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 10px;
      }

      .cinema-label {
        color: color-mix(in srgb, var(--target-color) 80%, white);
        font-size: 10px;
        font-weight: 950;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      .cinema-planet-name {
        color: #fff;
        font-size: 18px;
        font-weight: 950;
        white-space: nowrap;
      }

      .cinema-hud p {
        color: rgba(255, 255, 255, 0.72);
        font-size: 13px;
        line-height: 1.45;
        margin-bottom: 12px;
      }

      .cinema-actions {
        display: flex;
        gap: 9px;
        flex-wrap: wrap;
      }

      .cinema-btn {
        padding: 8px 12px;
        font-size: 12px;
        box-shadow: none;
      }

      .fun-toast {
        position: absolute;
        right: 24px;
        bottom: 120px;
        width: min(380px, calc(100vw - 48px));
        padding: 14px 15px;
        border-radius: 18px;
        background:
          radial-gradient(
            circle at 15% 20%,
            color-mix(in srgb, var(--target-color) 20%, transparent),
            transparent 55%
          ),
          rgba(5, 9, 22, 0.92);
        border: 1px solid
          color-mix(in srgb, var(--target-color) 30%, rgba(255, 255, 255, 0.1));
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.45);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        opacity: 0;
        transform: translateY(16px);
        transition:
          opacity 0.3s ease,
          transform 0.3s ease;
        z-index: 25;
        pointer-events: none;
      }

      .fun-toast.visible {
        opacity: 1;
        transform: translateY(0);
      }

      .fun-toast strong {
        display: block;
        color: color-mix(in srgb, var(--target-color) 78%, white);
        font-size: 10px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        margin-bottom: 6px;
      }

      .fun-toast p {
        color: rgba(255, 255, 255, 0.78);
        font-size: 13px;
        line-height: 1.45;
      }

      .stardust {
        position: absolute;
        inset: 0;
        pointer-events: none;
        opacity: 0;
        background-image:
          radial-gradient(
            circle,
            rgba(255, 255, 255, 0.86) 1px,
            transparent 1px
          ),
          radial-gradient(
            circle,
            color-mix(in srgb, var(--target-color) 78%, white) 1px,
            transparent 1px
          );
        background-size:
          92px 92px,
          140px 140px;
        background-position:
          0 0,
          42px 60px;
        filter: drop-shadow(
          0 0 8px color-mix(in srgb, var(--target-color) 55%, transparent)
        );
        z-index: 1;
      }

      .detected .stardust {
        animation: stardustIn 1.2s ease forwards;
      }

      @keyframes stardustIn {
        0% {
          opacity: 0;
          transform: scale(1.2);
        }

        100% {
          opacity: 0.22;
          transform: scale(1);
        }
      }

      .scan-burst {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 30vmin;
        height: 30vmin;
        border-radius: 50%;
        border: 2px solid
          color-mix(in srgb, var(--target-color) 70%, rgba(255, 255, 255, 0.3));
        box-shadow:
          0 0 30px color-mix(in srgb, var(--target-color) 38%, transparent),
          inset 0 0 30px
            color-mix(in srgb, var(--target-color) 18%, transparent);
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.2);
        pointer-events: none;
        z-index: 3;
      }

      .detected .scan-burst {
        animation: scanBurst 1.1s ease-out forwards;
      }

      @keyframes scanBurst {
        0% {
          opacity: 0;
          transform: translate(-50%, -50%) scale(0.18);
        }

        20% {
          opacity: 0.9;
        }

        100% {
          opacity: 0;
          transform: translate(-50%, -50%) scale(2.2);
        }
      }

      @media (max-width: 900px) {
        .scan-frame {
          inset: 23% 8% 24%;
        }

        .cinema-title {
          font-size: clamp(54px, 17vw, 150px);
        }

        .cinema-subtitle {
          top: 57%;
        }

        .fun-toast {
          left: 50%;
          right: auto;
          bottom: 118px;
          transform: translateX(-50%) translateY(16px);
        }

        .fun-toast.visible {
          transform: translateX(-50%) translateY(0);
        }
      }

      @media (max-width: 700px) {
        .scanner-top {
          top: 12px;
          left: 12px;
          right: 12px;
          align-items: flex-start;
        }

        .scanner-status {
          font-size: 10px;
          padding: 8px 10px;
        }

        .cinema-subtitle p {
          display: none;
        }

        .cinema-hud {
          bottom: 16px;
        }

        .cinema-hud-top {
          align-items: flex-start;
          flex-direction: column;
          gap: 4px;
        }

        .cinema-actions {
          display: grid;
          grid-template-columns: 1fr 1fr;
        }

        .cinema-btn {
          text-align: center;
        }
      }
    </style>
  </head>

  <body>
    <div class="scanner-ui" id="scanner-ui">
      <div class="stardust"></div>
      <div class="scan-burst"></div>

      <div class="scanner-top">
        <a class="scanner-back" href="/">← Back to GalaxyAR</a>
        <div class="scanner-status" id="scan-status">
          🔎 Scanning GalaxyAR card...
        </div>
      </div>

      <div class="scan-frame"></div>

      <div class="scanner-guide" id="scanner-guide">
        Show any <strong>GalaxyAR card</strong>: planet, Sun, Milky Way, or
        Solar System.
      </div>

      <div class="cinema-title" id="cinema-title">GALAXYAR</div>

      <div class="cinema-subtitle" id="cinema-subtitle">
        <div class="kicker" id="cinema-kicker">Target Detected</div>
        <h1 id="cinema-name">GalaxyAR</h1>
        <p id="cinema-line">A cinematic augmented reality reveal.</p>
      </div>

      <div class="cinema-hud" id="cinema-hud">
        <div class="cinema-hud-top">
          <div>
            <div class="cinema-label">Cinematic Scanner</div>
            <div class="cinema-planet-name" id="hud-name">GalaxyAR</div>
          </div>
          <div class="cinema-label" id="hud-nickname">AR Reveal</div>
        </div>

        <p id="hud-line">Scan a card to begin the reveal.</p>

        <div class="cinema-actions">
          <button class="cinema-btn" id="replay-btn">Replay Reveal</button>
          <button class="cinema-btn" id="fact-btn">Fun Fact</button>
          <button class="cinema-btn" id="narrate-btn">Narrate</button>
          <button class="cinema-btn" id="details-btn">Open Details</button>
        </div>
      </div>

      <div class="fun-toast" id="fun-toast">
        <strong id="fun-title">Fun Fact</strong>
        <p id="fun-text"></p>
      </div>
    </div>

    <a-scene
      mindar-image="imageTargetSrc: /targets/galaxyar.mind; maxTrack: 1; filterMinCF: 0.0001; filterBeta: 0.001;"
      color-space="sRGB"
      renderer="colorManagement: true; physicallyCorrectLights: true; antialias: true; alpha: true;"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-assets>
        <img id="earthTexture" src="/textures/earth.jpg" />
        <img id="jupiterTexture" src="/textures/jupiter.jpg" />
        <img id="marsTexture" src="/textures/mars.jpg" />
        <img id="mercuryTexture" src="/textures/mercury.jpg" />
        <img id="neptuneTexture" src="/textures/neptune.jpg" />
        <img id="saturnTexture" src="/textures/saturn.jpg" />
        <img id="sunTexture" src="/textures/sun.jpg" />
        <img id="uranusTexture" src="/textures/uranus.jpg" />
        <img id="venusTexture" src="/textures/venus.jpg" />
        <img id="moonTexture" src="/textures/moon.jpg" />
        <img id="cloudTexture" src="/textures/earth_clouds.png" />
        <img id="milkywayCardTexture" src="/targets/milkyway.png" />
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-light type="ambient" intensity="1.8"></a-light>
      <a-light type="directional" position="0 1 1" intensity="2.1"></a-light>
      <a-light type="point" position="0 0.8 1" intensity="1.25"></a-light>

      <!-- 0 EARTH -->
      <a-entity id="target-earth" mindar-image-target="targetIndex: 0">
        <a-entity
          id="rig-earth"
          class="ar-rig"
          position="0 0.08 0.08"
          scale="0.001 0.001 0.001"
          animation__reveal="property: scale; from: 0.001 0.001 0.001; to: 0.56 0.56 0.56; startEvents: reveal; dur: 1150; easing: easeOutElastic;"
          animation__float="property: position; dir: alternate; to: 0 0.14 0.08; loop: true; dur: 2400; easing: easeInOutSine;"
        >
          <a-sphere
            radius="0.35"
            material="src: #earthTexture; roughness: 0.85; metalness: 0;"
            animation="property: rotation; from: 0 0 0; to: 0 360 0; loop: true; dur: 10000; easing: linear;"
          ></a-sphere>

          <a-sphere
            radius="0.362"
            material="src: #cloudTexture; opacity: 0.35; transparent: true;"
            animation="property: rotation; from: 0 0 0; to: 0 -360 0; loop: true; dur: 14000; easing: linear;"
          ></a-sphere>

          <a-sphere
            radius="0.45"
            material="color: #4f9fff; opacity: 0.18; transparent: true; shader: flat; side: back;"
            animation="property: scale; dir: alternate; to: 1.16 1.16 1.16; loop: true; dur: 1700; easing: easeInOutSine;"
          ></a-sphere>

          <a-torus
            radius="0.55"
            radius-tubular="0.006"
            rotation="90 0 0"
            material="color: #91c8ff; opacity: 0.44; transparent: true; shader: flat;"
          ></a-torus>

          <a-entity
            animation="property: rotation; from: 0 0 0; to: 0 360 0; loop: true; dur: 5500; easing: linear;"
          >
            <a-sphere
              position="0.55 0 0"
              radius="0.055"
              material="src: #moonTexture; roughness: 1;"
            ></a-sphere>
          </a-entity>
        </a-entity>
      </a-entity>

      <!-- 1 JUPITER -->
      <a-entity id="target-jupiter" mindar-image-target="targetIndex: 1">
        <a-entity
          id="rig-jupiter"
          class="ar-rig"
          position="0 0.08 0.08"
          scale="0.001 0.001 0.001"
          animation__reveal="property: scale; from: 0.001 0.001 0.001; to: 0.52 0.52 0.52; startEvents: reveal; dur: 1150; easing: easeOutElastic;"
          animation__float="property: position; dir: alternate; to: 0 0.14 0.08; loop: true; dur: 2500; easing: easeInOutSine;"
        >
          <a-sphere
            radius="0.42"
            material="src: #jupiterTexture; roughness: 0.9; metalness: 0;"
            animation="property: rotation; from: 0 0 0; to: 0 360 0; loop: true; dur: 8500; easing: linear;"
          ></a-sphere>

          <a-sphere
            radius="0.52"
            material="color: #d4a16f; opacity: 0.16; transparent: true; shader: flat; side: back;"
            animation="property: scale; dir: alternate; to: 1.14 1.14 1.14; loop: true; dur: 1700; easing: easeInOutSine;"
          ></a-sphere>

          <a-torus
            radius="0.66"
            radius-tubular="0.004"
            rotation="90 0 0"
            material="color: #eac08a; opacity: 0.28; transparent: true; shader: flat;"
          ></a-torus>

          <a-entity
            animation="property: rotation; from: 0 0 0; to: 0 360 0; loop: true; dur: 6500; easing: linear;"
          >
            <a-sphere
              position="0.55 0 0"
              radius="0.03"
              material="color: #f2d08b;"
            ></a-sphere>
            <a-sphere
              position="-0.62 0 0"
              radius="0.034"
              material="color: #d7c3a4;"
            ></a-sphere>
            <a-sphere
              position="0 0 0.66"
              radius="0.038"
              material="color: #b7a48d;"
            ></a-sphere>
            <a-sphere
              position="0 0 -0.72"
              radius="0.026"
              material="color: #caa475;"
            ></a-sphere>
          </a-entity>
        </a-entity>
      </a-entity>

      const narrateBtn = document.getElementById("narrate-btn");
      const detailsBtn = document.getElementById("details-btn");
      const funToast = document.getElementById("fun-toast");
      const funTitle = document.getElementById("fun-title");
      const funText = document.getElementById("fun-text");

      let activeTarget = null;
      let spokenTarget = null;
      let factTimer = null;

      function speak(text) {
        try {
          const utterance = new SpeechSynthesisUtterance(text);
          utterance.rate = 0.92;
          utterance.pitch = 1.02;
          window.speechSynthesis.cancel();
          window.speechSynthesis.speak(utterance);
        } catch {
          // Speech is optional.
        }
      }

      function resetRevealAnimation() {
        ui.classList.remove("detected");
        void ui.offsetWidth;
        ui.classList.add("detected");
      }

      function revealRig(target) {
        const rig = document.getElementById(`rig-${target.id}`);

        if (!rig) return;

        rig.setAttribute("scale", "0.001 0.001 0.001");
        rig.emit("reveal");
      }

      function showTarget(index) {
        const target = TARGETS[index];

        if (!target) return;

        activeTarget = target;

        root.style.setProperty("--target-color", target.color);

        titleEl.textContent = target.name;
        kickerEl.textContent = target.type;
        nameEl.textContent = target.name;
        lineEl.textContent = target.line;

        hudName.textContent = target.name;
        hudNickname.textContent = target.nickname;
        hudLine.textContent = target.line;

        statusEl.textContent = `🟢 ${target.name} detected`;
        guide.classList.add("hidden");
        hud.classList.add("visible");

        resetRevealAnimation();
        revealRig(target);

        if (spokenTarget !== target.name) {
          spokenTarget = target.name;
          speak(target.narration);
        }
      }

      function hideTarget(index) {
        const target = TARGETS[index];

        if (!target) return;

        if (activeTarget?.name === target.name) {
          activeTarget = null;
          ui.classList.remove("detected");
          hud.classList.remove("visible");
          guide.classList.remove("hidden");
          funToast.classList.remove("visible");
          statusEl.textContent = "🟡 Target lost — show a GalaxyAR card";
        }
      }

      function showFact() {
        if (!activeTarget) return;

        funTitle.textContent = `${activeTarget.name} Fun Fact`;
        funText.textContent = activeTarget.fun;
        funToast.classList.add("visible");

        clearTimeout(factTimer);
        factTimer = setTimeout(() => {
          funToast.classList.remove("visible");
        }, 5500);
      }

      TARGETS.forEach((target, index) => {
        const targetEntity = document.getElementById(`target-${target.id}`);

        if (!targetEntity) return;

        targetEntity.addEventListener("targetFound", () => {
          showTarget(index);
        });

        targetEntity.addEventListener("targetLost", () => {
          hideTarget(index);
        });
      });

      replayBtn.addEventListener("click", () => {
        if (!activeTarget) return;

        resetRevealAnimation();
        revealRig(activeTarget);
      });

      factBtn.addEventListener("click", showFact);

      narrateBtn.addEventListener("click", () => {
        if (!activeTarget) return;

        speak(activeTarget.narration);
      });

      detailsBtn.addEventListener("click", () => {
        if (!activeTarget) return;

        window.location.href = activeTarget.detailsUrl;
      });
    </script>
  </body>
</html>
