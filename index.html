<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>GalaxyAR 🪐</title>

    <!-- A-Frame FIRST -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <!-- AR.js SECOND -->
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.min.js"></script>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }

      /* A-Frame manages its own canvas fullscreen — don't interfere */
      a-scene {
        position: fixed !important;
        top: 0;
        left: 0;
        width: 100vw !important;
        height: 100vh !important;
        z-index: 1;
      }

      /* The AR.js injected video — must cover full screen */
      .a-canvas,
      canvas {
        width: 100vw !important;
        height: 100vh !important;
      }

      /* React UI mounts here — floats above the AR scene */
      #ui-root {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 100;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <!-- ═══════════════════════════════════════════
         A-FRAME / AR.JS SCENE — Lives in raw HTML.
         Do NOT wrap in React — that causes the black screen.
         ═══════════════════════════════════════════ -->
    <a-scene
      vr-mode-ui="enabled: false"
      renderer="antialias: true; alpha: true; logarithmicDepthBuffer: true;"
      arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;"
    >
      <!-- Lights -->
      <a-light type="ambient" color="#ffffff" intensity="1.8"></a-light>
      <a-light
        type="directional"
        color="#ffffff"
        intensity="1.0"
        position="1 3 2"
      ></a-light>
      <a-light
        type="point"
        color="#ffcc44"
        intensity="2.0"
        position="0 0 0"
        distance="5"
        decay="2"
      ></a-light>

      <!-- ── HIRO MARKER ── -->
      <a-marker
        id="hiro-marker"
        preset="hiro"
        emitevents="true"
        cursor="rayOrigin: mouse"
        raycaster="objects: .clickable"
      >
        <!-- SUN -->
        <a-sphere
          id="sun"
          position="0 0.12 0"
          radius="0.12"
          src="/textures/sun.jpg"
          emissive="#ff6600"
          emissive-intensity="0.9"
        >
        </a-sphere>

        <!-- Sun glow -->
        <a-sphere
          position="0 0.12 0"
          radius="0.19"
          material="color:#ff8800;opacity:0.12;transparent:true;shader:flat;side:back;"
        >
        </a-sphere>

        <!-- ── ORBIT RINGS ── -->
        <a-torus
          position="0 0.01 0"
          radius="0.25"
          radius-tubular="0.003"
          segments-tubular="64"
          rotation="-90 0 0"
          material="color:#ffffff;opacity:0.2;transparent:true;shader:flat;"
        ></a-torus>
        <a-torus
          position="0 0.01 0"
          radius="0.38"
          radius-tubular="0.003"
          segments-tubular="64"
          rotation="-90 0 0"
          material="color:#ffffff;opacity:0.2;transparent:true;shader:flat;"
        ></a-torus>
        <a-torus
          position="0 0.01 0"
          radius="0.52"
          radius-tubular="0.003"
          segments-tubular="64"
          rotation="-90 0 0"
          material="color:#ffffff;opacity:0.2;transparent:true;shader:flat;"
        ></a-torus>
        <a-torus
          position="0 0.01 0"
          radius="0.65"
          radius-tubular="0.003"
          segments-tubular="64"
          rotation="-90 0 0"
          material="color:#ffffff;opacity:0.2;transparent:true;shader:flat;"
        ></a-torus>
        <a-torus
          position="0 0.01 0"
          radius="0.78"
          radius-tubular="0.003"
          segments-tubular="64"
          rotation="-90 0 0"
          material="color:#ffffff;opacity:0.2;transparent:true;shader:flat;"
        ></a-torus>
        <a-torus
          position="0 0.01 0"
          radius="0.88"
          radius-tubular="0.003"
          segments-tubular="64"
          rotation="-90 0 0"
          material="color:#ffffff;opacity:0.2;transparent:true;shader:flat;"
        ></a-torus>
        <a-torus

          radius="0.93"
          radius-tubular="0.003"
          segments-tubular="64"
          rotation="-90 0 0"
          material="color:#ffffff;opacity:0.2;transparent:true;shader:flat;"
        ></a-torus>
        <a-torus
          position="0 0.01 0"
          radius="1.00"
          radius-tubular="0.003"
          segments-tubular="64"
          rotation="-90 0 0"
          material="color:#ffffff;opacity:0.2;transparent:true;shader:flat;"

        >
          <a-sphere

            data-planet="Saturn"

          <!-- Saturn ring -->
          <a-torus

            segments-tubular="60"

        <!-- Uranus -->
        <a-entity

          <a-sphere

      <!-- AR.js controls the camera — don't add a manual camera entity -->
      <a-entity camera></a-entity>
    </a-scene>

    <!-- React UI mounts here -->
    <div id="ui-root"></div>

    <!-- ══════════════════════════════════════
         PLANET ORBIT ANIMATION (vanilla JS)
         Runs independently of React so orbits
         work even before React mounts.
         ══════════════════════════════════════ -->
    <script>
      (function () {
        const planets = [
          { id: "planet-Mercury", dist: 0.25, speed: 0.02, angle: 0 },
          { id: "planet-Venus", dist: 0.38, speed: 0.016, angle: 45 },
          { id: "planet-Earth", dist: 0.52, speed: 0.012, angle: 90 },
          { id: "planet-Mars", dist: 0.65, speed: 0.009, angle: 135 },
          { id: "planet-Jupiter", dist: 0.78, speed: 0.006, angle: 180 },
          { id: "planet-Saturn", dist: 0.88, speed: 0.005, angle: 225 },
          { id: "planet-Uranus", dist: 0.93, speed: 0.004, angle: 270 },
          { id: "planet-Neptune", dist: 1.0, speed: 0.003, angle: 315 },
        ];

        let paused = false;
        window.__galaxyAR = {
          setPaused: (v) => {
            paused = v;
          },
        };

        function animate() {
          planets.forEach((p) => {
            if (!paused) p.angle += p.speed;
            const el = document.getElementById(p.id);
            if (el) {
              const x = p.dist * Math.cos(p.angle);
              const z = p.dist * Math.sin(p.angle);
              el.setAttribute("position", `${x} 0.05 ${z}`);
            }
          });
          requestAnimationFrame(animate);
        }

        // Start after A-Frame is ready
        document.addEventListener("DOMContentLoaded", () => {
          const scene = document.querySelector("a-scene");
          if (scene && scene.hasLoaded) {
            animate();
          } else if (scene) {
            scene.addEventListener("loaded", animate);
          } else {
            animate(); // fallback
          }

          function setupPrecisePlanetClicks() {
            const scene = document.querySelector("a-scene");

            if (!scene) return;

            const start = () => {
              const canvas = scene.canvas;

              if (!canvas) return;

              let downX = 0;
              let downY = 0;

              canvas.addEventListener(
                "pointerdown",
                (e) => {
                  downX = e.clientX;
                  downY = e.clientY;
                },
                { passive: true },
              );

              canvas.addEventListener(
                "pointerup",
                (e) => {
                  const dx = e.clientX - downX;
                  const dy = e.clientY - downY;

                  // ignore drag
                  if (Math.sqrt(dx * dx + dy * dy) > 8) return;

                  const camera = scene.camera;

                  if (!camera) return;

                  const rect = canvas.getBoundingClientRect();

                  const ndcX = ((e.clientX - rect.left) / rect.width) * 2 - 1;
                  const ndcY = -((e.clientY - rect.top) / rect.height) * 2 + 1;

                  let bestPlanet = null;
                  let bestDistance = Infinity;

                  planets.forEach((p) => {
                    const orbitEl = document.getElementById(p.id);

                    if (!orbitEl) return;

                    const sphere = orbitEl.querySelector(".planet-sphere");

                    if (!sphere || !sphere.object3D) return;

                    const pos = new THREE.Vector3();

                    sphere.object3D.getWorldPosition(pos);

                    const projected = pos.clone().project(camera);

                    const distX = projected.x - ndcX;
                    const distY = projected.y - ndcY;

                    const dist = Math.sqrt(distX * distX + distY * distY);

                    const threshold = 0.08;

                    if (dist < threshold && dist < bestDistance) {
                      bestDistance = dist;

                      bestPlanet = sphere.getAttribute("data-planet");
                    }
                  });

                  if (bestPlanet) {
                    console.log("Clicked:", bestPlanet);

                    window.dispatchEvent(
                      new CustomEvent("planet-clicked", {
                        detail: { name: bestPlanet },
                      }),
                    );
                  }
                },
                { passive: true },
              );
            };

            if (scene.hasLoaded) {
              start();
            } else {
              scene.addEventListener("loaded", start);
            }
          }

          setupPrecisePlanetClicks();
        });

        // Planet click → dispatch custom event for React to catch
        document.addEventListener("click", (e) => {
          const el = e.target;
          const name = el.getAttribute("data-planet");
          if (name) {
            window.dispatchEvent(
              new CustomEvent("planet-clicked", { detail: { name } }),
            );
          }
        });
      })();
    </script>

    <!-- React app -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
