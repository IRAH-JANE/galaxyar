<!doctype html>
<html lang="en">
  <head>
    <script src="https://raw.githack.com/fcor/aframe-gesture-detector/master/dist/aframe-gesture-detector.min.js"></script>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.min.js"></script>
    <script src="https://unpkg.com/aframe-particle-system-component@1.1.3/dist/aframe-particle-system-component.min.js"></script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>galaxyar</title>
    <style>
      /* 👉 CRITICAL: Fixes the Black Screen in Fullscreen */
      body {
        margin: 0;
        overflow: hidden;
        background-color: transparent !important;
      }
      /* This ensures the camera video stays behind the 3D content */
      video {
        position: absolute !important;
        top: 0 !important;
        left: 0 !important;
        width: 100% !important;
        height: 100% !important;
        object-fit: cover !important;
        z-index: -2 !important;
      }
      #root {
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      AFRAME.registerComponent("gesture-handler", {
        init: function () {
          let el = this.el;
          let scale = 1;

          this.el.sceneEl.addEventListener("onefingermove", (e) => {
            el.object3D.rotation.y += e.detail.positionChange.x * 0.01;
            el.object3D.rotation.x += e.detail.positionChange.y * 0.01;
          });

          this.el.sceneEl.addEventListener("twofingermove", (e) => {
            scale += e.detail.spreadChange * 0.001;
            scale = Math.min(Math.max(0.5, scale), 3);
            el.object3D.scale.set(scale, scale, scale);
          });
        },
      });
    </script>
  </body>
</html>
